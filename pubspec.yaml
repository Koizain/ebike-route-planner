name: ebike_route_planner
description: eBike Route Planner - Plan your cycling routes with battery range estimation
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  http: ^1.2.2
  provider: ^6.1.2
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.5
  flutter_launcher_icons: ^0.14.3
  share_plus: ^10.0.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#00C853"
  adaptive_icon_foreground: "assets/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/
